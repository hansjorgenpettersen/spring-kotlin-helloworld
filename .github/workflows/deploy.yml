name: Deploy to Linux Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          cd $HOME/spring-kotlin-helloworld
          git pull origin main

      - name: Restart app
        run: |
          pkill -f 'spring-boot:run' || true
          sleep 2
          cd $HOME/spring-kotlin-helloworld
          nohup mvn spring-boot:run > $HOME/helloworld.log 2>&1 &
          echo "Deployed successfully"
